<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pig Galaga</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; image-rendering: pixelated; }
  #ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 18px;
    display: flex;
    gap: 40px;
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
    z-index: 10;
    user-select: none;
  }
  #ui span { white-space: nowrap; }
  .score-val { color: #ffdd57; }
  .lives-val { color: #ff6b6b; }
  .wave-val { color: #69db7c; }
</style>
</head>
<body>
<div id="ui">
  <span>SCORE: <span class="score-val" id="scoreDisplay">0</span></span>
  <span>LIVES: <span class="lives-val" id="livesDisplay">3</span></span>
  <span>WAVE: <span class="wave-val" id="waveDisplay">1</span></span>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 480, H = 640;
canvas.width = W;
canvas.height = H;

// Scale canvas to fit viewport
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Sound Engine (Web Audio API) ───
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playOink(pitch, duration) {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  // Nasal oscillator for pig oink
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  const nasal = ctx.createBiquadFilter();
  nasal.type = 'bandpass';
  nasal.frequency.value = pitch * 2.5;
  nasal.Q.value = 5;
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(pitch, t);
  osc1.frequency.exponentialRampToValueAtTime(pitch * 0.6, t + duration);
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(pitch * 1.01, t);
  osc2.frequency.exponentialRampToValueAtTime(pitch * 0.58, t + duration);
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc1.connect(nasal);
  osc2.connect(nasal);
  nasal.connect(gain);
  gain.connect(ctx.destination);
  osc1.start(t);
  osc2.start(t);
  osc1.stop(t + duration);
  osc2.stop(t + duration);
}

function sfxShoot() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(880, t);
  osc.frequency.exponentialRampToValueAtTime(220, t + 0.08);
  gain.gain.setValueAtTime(0.12, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.08);
}

function sfxHitPig() {
  // Short oink squeak on hit
  playOink(500 + Math.random() * 200, 0.12);
}

function sfxPigDeath() {
  // Dramatic descending oink-squeal
  playOink(600 + Math.random() * 100, 0.3);
  setTimeout(() => playOink(350, 0.25), 80);
}

function sfxPlayerHit() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  // Noise burst explosion
  const bufferSize = ctx.sampleRate * 0.3;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000, t);
  filter.frequency.exponentialRampToValueAtTime(100, t + 0.3);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  noise.start(t);
  noise.stop(t + 0.3);
}

function sfxEnemyShoot() {
  // Low grunt/snort
  playOink(180 + Math.random() * 60, 0.08);
}

function sfxPowerup() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  [0, 0.08, 0.16].forEach((d, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 440 * (1 + i * 0.25);
    gain.gain.setValueAtTime(0.1, t + d);
    gain.gain.exponentialRampToValueAtTime(0.001, t + d + 0.1);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t + d);
    osc.stop(t + d + 0.1);
  });
}

function sfxBaconBoost() {
  const ctx = ensureAudio();
  const t = ctx.currentTime;
  // Sizzle noise + triumphant oink
  const bufferSize = ctx.sampleRate * 0.5;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.3 * Math.sin(i / bufferSize * Math.PI);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 6000; bp.Q.value = 1;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  noise.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  noise.start(t); noise.stop(t + 0.5);
  // Big triumphant oink
  setTimeout(() => { playOink(400, 0.3); }, 100);
  setTimeout(() => { playOink(500, 0.3); }, 250);
  setTimeout(() => { playOink(600, 0.4); }, 400);
}

function sfxWave() {
  // Pig chorus — multiple oinks
  playOink(300, 0.2);
  setTimeout(() => playOink(400, 0.2), 120);
  setTimeout(() => playOink(500, 0.25), 240);
  setTimeout(() => playOink(350, 0.3), 400);
}

// ─── Game State ───
let score = 0, lives = 3, wave = 1;
let gameOver = false, paused = false, gameStarted = false;
let invincibleTimer = 0;
let stars = [];
let player, bullets, enemies, enemyBullets, particles, powerups;
let enemyFormationDir = 1;
let enemyDiveTimer = 0;
let waveTransition = 0;
let shakeTimer = 0;
let baconBoostTimer = 0; // frames remaining for triple-fire

// ─── Input ───
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile touch
let touchX = null;
let touchShooting = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  touchX = (e.touches[0].clientX - rect.left) * scaleX;
  touchShooting = true;
  if (!gameStarted) gameStarted = true;
  if (gameOver) restartGame();
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  touchX = (e.touches[0].clientX - rect.left) * scaleX;
});
canvas.addEventListener('touchend', e => {
  touchX = null;
  touchShooting = false;
});

// ─── Stars ───
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    speed: 0.3 + Math.random() * 1.5,
    size: 0.5 + Math.random() * 1.5,
    brightness: 0.3 + Math.random() * 0.7
  });
}

// ─── Drawing Helpers ───
function drawPig(x, y, size, type, frame) {
  ctx.save();
  ctx.translate(x, y);

  const s = size;
  const bob = Math.sin(frame * 0.08) * 2;
  ctx.translate(0, bob);

  // Pig types: 0=baby, 1=mama, 2=papa, 3=grandpa, 4=Bacon King
  const colors = {
    0: { body: '#ffb6c1', snout: '#ff8fa3', ear: '#ff69b4', eye: '#222' },
    1: { body: '#f8a4b8', snout: '#e8758a', ear: '#e05580', eye: '#222' },
    2: { body: '#e89090', snout: '#d06060', ear: '#c04040', eye: '#222' },
    3: { body: '#d4a0a0', snout: '#c07070', ear: '#a05050', eye: '#222' },
    4: { body: '#ffd700', snout: '#ffaa00', ear: '#ff8c00', eye: '#600' }
  };
  const c = colors[type] || colors[0];

  // Ears
  ctx.fillStyle = c.ear;
  ctx.beginPath();
  ctx.ellipse(-s * 0.55, -s * 0.55, s * 0.22, s * 0.35, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s * 0.55, -s * 0.55, s * 0.22, s * 0.35, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = c.body;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.7, s * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = c.snout;
  ctx.beginPath();
  ctx.ellipse(0, s * 0.1, s * 0.32, s * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nostrils
  ctx.fillStyle = '#00000044';
  ctx.beginPath();
  ctx.ellipse(-s * 0.1, s * 0.12, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s * 0.1, s * 0.12, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-s * 0.25, -s * 0.15, s * 0.13, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s * 0.25, -s * 0.15, s * 0.13, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils (look down at player)
  ctx.fillStyle = c.eye;
  ctx.beginPath();
  ctx.arc(-s * 0.25, -s * 0.1, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.25, -s * 0.1, s * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // Eyebrows (angry!)
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-s * 0.38, -s * 0.32);
  ctx.lineTo(-s * 0.12, -s * 0.25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s * 0.38, -s * 0.32);
  ctx.lineTo(s * 0.12, -s * 0.25);
  ctx.stroke();

  // Bacon King glow aura
  if (type === 4) {
    ctx.save();
    ctx.globalAlpha = 0.25 + Math.sin(frame * 0.1) * 0.15;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(0, 0, s * 1.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Type-specific accessories
  if (type === 1) {
    // Mama pig - bow
    ctx.fillStyle = '#ff1493';
    ctx.beginPath();
    ctx.moveTo(-s * 0.5, -s * 0.65);
    ctx.lineTo(-s * 0.7, -s * 0.85);
    ctx.lineTo(-s * 0.45, -s * 0.7);
    ctx.lineTo(-s * 0.3, -s * 0.9);
    ctx.lineTo(-s * 0.45, -s * 0.65);
    ctx.fill();
  }
  if (type === 2) {
    // Papa pig - tiny hat
    ctx.fillStyle = '#333';
    ctx.fillRect(-s * 0.3, -s * 0.85, s * 0.6, s * 0.2);
    ctx.fillRect(-s * 0.2, -s * 1.1, s * 0.4, s * 0.3);
  }
  if (type === 3) {
    // Grandpa pig - glasses
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-s * 0.25, -s * 0.15, s * 0.17, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(s * 0.25, -s * 0.15, s * 0.17, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 0.08, -s * 0.15);
    ctx.lineTo(s * 0.08, -s * 0.15);
    ctx.stroke();
    // Mustache
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.28, s * 0.25, s * 0.08, 0, 0, Math.PI);
    ctx.fill();
  }
  if (type === 4) {
    // Bacon King - crown
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-s * 0.4, -s * 0.55);
    ctx.lineTo(-s * 0.45, -s * 1.0);
    ctx.lineTo(-s * 0.2, -s * 0.75);
    ctx.lineTo(0, -s * 1.1);
    ctx.lineTo(s * 0.2, -s * 0.75);
    ctx.lineTo(s * 0.45, -s * 1.0);
    ctx.lineTo(s * 0.4, -s * 0.55);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Crown jewels
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(0, -s * 0.85, s * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#00ccff';
    ctx.beginPath(); ctx.arc(-s * 0.28, -s * 0.7, s * 0.05, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s * 0.28, -s * 0.7, s * 0.05, 0, Math.PI * 2); ctx.fill();
    // Bacon strips on cheeks
    ctx.strokeStyle = '#cc3300';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const yy = -s * 0.1 + i * s * 0.12;
      ctx.beginPath();
      ctx.moveTo(-s * 0.65, yy);
      ctx.quadraticCurveTo(-s * 0.55, yy - 3, -s * 0.45, yy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s * 0.65, yy);
      ctx.quadraticCurveTo(s * 0.55, yy - 3, s * 0.45, yy);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawShip(x, y, invincible) {
  ctx.save();
  ctx.translate(x, y);

  if (invincible && Math.floor(Date.now() / 100) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Thruster flame
  const flicker = Math.random() * 6;
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(-8, 12);
  ctx.lineTo(0, 22 + flicker);
  ctx.lineTo(8, 12);
  ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(-4, 12);
  ctx.lineTo(0, 18 + flicker * 0.5);
  ctx.lineTo(4, 12);
  ctx.fill();

  // Ship body
  ctx.fillStyle = '#4dabf7';
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.lineTo(-14, 12);
  ctx.lineTo(-8, 12);
  ctx.lineTo(-6, 6);
  ctx.lineTo(6, 6);
  ctx.lineTo(8, 12);
  ctx.lineTo(14, 12);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#74c0fc';
  ctx.beginPath();
  ctx.ellipse(0, 0, 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings accent
  ctx.fillStyle = '#1971c2';
  ctx.beginPath();
  ctx.moveTo(-14, 12);
  ctx.lineTo(-18, 14);
  ctx.lineTo(-10, 10);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, 12);
  ctx.lineTo(18, 14);
  ctx.lineTo(10, 10);
  ctx.fill();

  ctx.restore();
}

// ─── Game Objects ───
function initGame() {
  player = { x: W / 2, y: H - 50, speed: 5, shootCooldown: 0 };
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  powerups = [];
  enemyDiveTimer = 0;
  enemyFormationDir = 1;
  spawnWave(wave);
}

function spawnWave(waveNum) {
  enemies = [];
  const rows = Math.min(3 + Math.floor(waveNum / 2), 6);
  const cols = Math.min(6 + Math.floor(waveNum / 3), 10);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let type;
      if (r === 0) type = 3;       // grandpa top row
      else if (r === 1) type = 2;  // papa second row
      else if (r === 2) type = 1;  // mama third row
      else type = 0;               // baby lower rows

      const size = [16, 20, 22, 26][type];
      const hp = [1, 2, 3, 4][type];
      const points = [100, 200, 400, 800][type];

      enemies.push({
        x: 60 + c * 42,
        y: -40 - r * 45,  // start offscreen
        targetY: 60 + r * 45,
        homeX: 60 + c * 42,
        homeY: 60 + r * 45,
        size,
        type,
        hp: hp + Math.floor(waveNum / 3),
        maxHp: hp + Math.floor(waveNum / 3),
        points,
        alive: true,
        diving: false,
        diveAngle: 0,
        diveSpeed: 0,
        diveTime: 0,
        entering: true,
        frame: Math.random() * 100
      });
    }
  }

  // Spawn Bacon King pig (rare, starting wave 2, one per wave)
  if (waveNum >= 2) {
    const bkCol = Math.floor(cols / 2);
    enemies.push({
      x: 60 + bkCol * 42,
      y: -40 - rows * 45,
      targetY: 35,
      homeX: 60 + bkCol * 42,
      homeY: 35,
      size: 30,
      type: 4,
      hp: 6 + Math.floor(waveNum / 2),
      maxHp: 6 + Math.floor(waveNum / 2),
      points: 1500,
      alive: true,
      diving: false,
      diveAngle: 0,
      diveSpeed: 0,
      diveTime: 0,
      entering: true,
      frame: Math.random() * 100
    });
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      color,
      size: 1 + Math.random() * 3
    });
  }
}

// ─── Update ───
let frameCount = 0;
let lastShot = 0;

function update() {
  frameCount++;

  if (gameOver || !gameStarted) return;

  // Player movement
  const moveLeft = keys['ArrowLeft'] || keys['a'];
  const moveRight = keys['ArrowRight'] || keys['d'];
  const shooting = keys[' '] || keys['ArrowUp'] || keys['z'];

  if (moveLeft) player.x -= player.speed;
  if (moveRight) player.x += player.speed;

  // Touch input
  if (touchX !== null) {
    const diff = touchX - player.x;
    if (Math.abs(diff) > 3) {
      player.x += Math.sign(diff) * Math.min(Math.abs(diff) * 0.15, player.speed);
    }
  }

  player.x = Math.max(20, Math.min(W - 20, player.x));

  // Shooting
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (baconBoostTimer > 0) baconBoostTimer--;
  if ((shooting || touchShooting) && player.shootCooldown <= 0) {
    if (baconBoostTimer > 0) {
      // Triple bacon fire!
      bullets.push({ x: player.x, y: player.y - 16, speed: -9, bacon: true });
      bullets.push({ x: player.x - 12, y: player.y - 10, speed: -8, bacon: true });
      bullets.push({ x: player.x + 12, y: player.y - 10, speed: -8, bacon: true });
      player.shootCooldown = 8;
    } else {
      bullets.push({ x: player.x, y: player.y - 16, speed: -8 });
      player.shootCooldown = 12;
    }
    sfxShoot();
  }

  // Invincibility
  if (invincibleTimer > 0) invincibleTimer--;

  // Bullets
  bullets = bullets.filter(b => {
    b.y += b.speed;
    return b.y > -10;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y < H + 10 && b.x > -10 && b.x < W + 10;
  });

  // Enemies enter and move
  let allInFormation = true;
  enemies.forEach(e => {
    if (!e.alive) return;
    e.frame++;

    if (e.entering) {
      e.y += 2.5;
      if (e.y >= e.targetY) {
        e.y = e.targetY;
        e.entering = false;
      }
      allInFormation = false;
    } else if (e.diving) {
      e.diveTime++;
      e.x += Math.sin(e.diveAngle) * e.diveSpeed;
      e.y += e.diveSpeed;
      e.diveAngle += 0.05;

      // Shoot while diving
      if (e.diveTime % 30 === 0) {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({
          x: e.x, y: e.y + e.size,
          vx: Math.cos(angle) * 4,
          vy: Math.sin(angle) * 4
        });
      }

      if (e.y > H + 30) {
        e.diving = false;
        e.x = e.homeX;
        e.y = e.homeY - 50;
        e.entering = true;
      }
    } else {
      // Formation movement
      e.x += 0.5 * enemyFormationDir;
    }
  });

  // Formation direction change
  const aliveEnemies = enemies.filter(e => e.alive && !e.diving && !e.entering);
  if (aliveEnemies.length > 0) {
    const minX = Math.min(...aliveEnemies.map(e => e.x));
    const maxX = Math.max(...aliveEnemies.map(e => e.x));
    if (maxX > W - 30 || minX < 30) {
      enemyFormationDir *= -1;
      aliveEnemies.forEach(e => { e.homeX += enemyFormationDir * 2; });
    }
  }

  // Dive timer
  enemyDiveTimer++;
  const diveInterval = Math.max(60, 180 - wave * 15);
  if (enemyDiveTimer > diveInterval && allInFormation) {
    enemyDiveTimer = 0;
    const candidates = enemies.filter(e => e.alive && !e.diving && !e.entering);
    if (candidates.length > 0) {
      const diver = candidates[Math.floor(Math.random() * candidates.length)];
      diver.diving = true;
      diver.diveAngle = Math.random() * Math.PI * 2;
      diver.diveSpeed = 2.5 + wave * 0.3;
      diver.diveTime = 0;
    }
  }

  // Random enemy shooting from formation
  if (frameCount % Math.max(20, 60 - wave * 5) === 0) {
    const shooters = enemies.filter(e => e.alive && !e.diving && !e.entering);
    if (shooters.length > 0) {
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      const angle = Math.atan2(player.y - shooter.y, player.x - shooter.x);
      enemyBullets.push({
        x: shooter.x, y: shooter.y + shooter.size,
        vx: Math.cos(angle) * (2.5 + wave * 0.2),
        vy: Math.sin(angle) * (2.5 + wave * 0.2)
      });
      sfxEnemyShoot();
    }
  }

  // Bullet-enemy collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      const dx = b.x - e.x, dy = b.y - e.y;
      if (Math.abs(dx) < e.size && Math.abs(dy) < e.size) {
        e.hp--;
        b.y = -999;
        spawnParticles(b.x, b.y, '#ffaa00', 4);
        sfxHitPig();
        if (e.hp <= 0) {
          e.alive = false;
          score += e.points;
          spawnParticles(e.x, e.y, '#ff6b6b', 15);
          spawnParticles(e.x, e.y, '#ffb6c1', 10);
          sfxPigDeath();

          // Bacon King killed → triple bacon boost!
          if (e.type === 4) {
            baconBoostTimer = 600; // 10 seconds at 60fps
            sfxBaconBoost();
            spawnParticles(e.x, e.y, '#ffd700', 25);
            spawnParticles(e.x, e.y, '#ff6600', 20);
          }

          // Chance for powerup
          if (Math.random() < 0.08) {
            powerups.push({ x: e.x, y: e.y, type: 'rapid', life: 300 });
          }
        }
      }
    });
  });

  // Enemy bullet - player collision
  if (invincibleTimer <= 0) {
    enemyBullets.forEach(b => {
      const dx = b.x - player.x, dy = b.y - player.y;
      if (Math.abs(dx) < 12 && Math.abs(dy) < 14) {
        b.y = 9999;
        playerHit();
      }
    });

    // Enemy - player collision
    enemies.forEach(e => {
      if (!e.alive) return;
      const dx = e.x - player.x, dy = e.y - player.y;
      if (Math.abs(dx) < e.size + 10 && Math.abs(dy) < e.size + 10) {
        e.alive = false;
        spawnParticles(e.x, e.y, '#ff6b6b', 20);
        playerHit();
      }
    });
  }

  // Powerups
  powerups = powerups.filter(p => {
    p.y += 1.5;
    p.life--;
    const dx = p.x - player.x, dy = p.y - player.y;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) {
      if (p.type === 'rapid') player.shootCooldown = 0;
      player.speed = 7; // temporary speed boost
      setTimeout(() => { if (player) player.speed = 5; }, 5000);
      spawnParticles(p.x, p.y, '#69db7c', 10);
      sfxPowerup();
      return false;
    }
    return p.life > 0 && p.y < H + 20;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    return p.life > 0;
  });

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  // Shake
  if (shakeTimer > 0) shakeTimer--;

  // Wave clear
  if (enemies.every(e => !e.alive)) {
    wave++;
    waveTransition = 120;
    sfxWave();
    spawnWave(wave);
  }

  // Wave transition
  if (waveTransition > 0) waveTransition--;

  // Update UI
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('livesDisplay').textContent = lives;
  document.getElementById('waveDisplay').textContent = wave;
}

function playerHit() {
  lives--;
  shakeTimer = 15;
  spawnParticles(player.x, player.y, '#4dabf7', 20);
  spawnParticles(player.x, player.y, '#ffcc00', 15);
  sfxPlayerHit();
  invincibleTimer = 120;
  if (lives <= 0) {
    gameOver = true;
  }
}

// ─── Draw ───
function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeTimer * 0.8,
      (Math.random() - 0.5) * shakeTimer * 0.8
    );
  }

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
  ctx.globalAlpha = 1;

  if (!gameStarted) {
    drawTitleScreen();
    ctx.restore();
    return;
  }

  // Particles (behind everything)
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Powerups
  powerups.forEach(p => {
    ctx.fillStyle = '#69db7c';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚡', p.x, p.y + 4);
  });

  // Player bullets
  bullets.forEach(b => {
    if (b.bacon) {
      // Bacon strip bullet!
      ctx.fillStyle = '#cc3300';
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 10;
      ctx.fillRect(b.x - 3, b.y, 6, 12);
      ctx.fillStyle = '#ff9966';
      ctx.fillRect(b.x - 1, b.y + 2, 2, 8);
    } else {
      ctx.fillStyle = '#ffcc00';
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 8;
      ctx.fillRect(b.x - 2, b.y, 4, 10);
    }
    ctx.shadowBlur = 0;
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;

    // Health bar for tough enemies
    if (e.maxHp > 1) {
      const barW = e.size * 1.2;
      const barH = 3;
      const barX = e.x - barW / 2;
      const barY = e.y - e.size - 6;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#69db7c' : '#ff6b6b';
      ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
    }

    drawPig(e.x, e.y, e.size, e.type, e.frame);
  });

  // Player
  if (!gameOver) {
    drawShip(player.x, player.y, invincibleTimer > 0);
  }

  // Bacon boost HUD
  if (baconBoostTimer > 0) {
    const secs = Math.ceil(baconBoostTimer / 60);
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    const pulse = 1 + Math.sin(frameCount * 0.15) * 0.15;
    ctx.save();
    ctx.translate(W / 2, H - 18);
    ctx.scale(pulse, pulse);
    ctx.fillText(`🥓 BACON BOOST ${secs}s 🥓`, 0, 0);
    ctx.restore();
    // Boost bar
    const barW = 160, barH = 4;
    ctx.fillStyle = '#331100';
    ctx.fillRect(W / 2 - barW / 2, H - 8, barW, barH);
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(W / 2 - barW / 2, H - 8, barW * (baconBoostTimer / 600), barH);
  }

  // Wave transition text
  if (waveTransition > 60) {
    ctx.globalAlpha = (waveTransition - 60) / 60;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`WAVE ${wave}`, W / 2, H / 2 - 20);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('The pig family attacks!', W / 2, H / 2 + 15);
    ctx.globalAlpha = 1;
  }

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);

    ctx.fillStyle = '#ffdd57';
    ctx.font = '24px monospace';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 10);

    ctx.fillStyle = '#aaa';
    ctx.font = '16px monospace';
    ctx.fillText('Press ENTER or tap to restart', W / 2, H / 2 + 50);
  }

  ctx.restore();
}

function drawTitleScreen() {
  // Title
  ctx.fillStyle = '#ffdd57';
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PIG GALAGA', W / 2, H / 3 - 20);

  ctx.fillStyle = '#ff8fa3';
  ctx.font = '18px monospace';
  ctx.fillText('The Pig Family Strikes Back!', W / 2, H / 3 + 15);

  // Draw sample pigs
  drawPig(W / 2 - 120, H / 2 - 20, 18, 0, frameCount);
  drawPig(W / 2 - 60, H / 2 - 20, 22, 1, frameCount);
  drawPig(W / 2, H / 2 - 20, 24, 2, frameCount);
  drawPig(W / 2 + 60, H / 2 - 20, 28, 3, frameCount);
  drawPig(W / 2 + 130, H / 2 - 20, 30, 4, frameCount);

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Baby   Mama   Papa  Grandpa  BACON', W / 2 + 5, H / 2 + 20);
  ctx.fillText('100    200    400    800     KING!', W / 2 + 5, H / 2 + 34);
  ctx.fillStyle = '#ff6600';
  ctx.font = '11px monospace';
  ctx.fillText('Kill the Bacon King for triple fire!', W / 2, H / 2 + 52);

  // Controls
  ctx.fillStyle = '#69db7c';
  ctx.font = '16px monospace';
  const blink = Math.sin(frameCount * 0.05) > 0;
  if (blink) {
    ctx.fillText('Press SPACE to Start', W / 2, H * 0.72);
  }

  ctx.fillStyle = '#888';
  ctx.font = '13px monospace';
  ctx.fillText('← → or A/D to move', W / 2, H * 0.80);
  ctx.fillText('SPACE or Z to shoot', W / 2, H * 0.85);
  ctx.fillText('Mobile: touch to play', W / 2, H * 0.90);
}

function restartGame() {
  score = 0;
  lives = 3;
  wave = 1;
  gameOver = false;
  invincibleTimer = 120;
  baconBoostTimer = 0;
  initGame();
}

// ─── Main Loop ───
function gameLoop() {
  // Start game on key press
  if (!gameStarted && (keys[' '] || keys['Enter'])) {
    gameStarted = true;
  }
  if (gameOver && (keys['Enter'] || keys[' '])) {
    restartGame();
  }

  update();
  draw();
  requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();
</script>
