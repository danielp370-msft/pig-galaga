<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pig Galaga: Space</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
  #hud {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 16px; display: flex; gap: 30px;
    text-shadow: 0 0 8px rgba(255,255,255,0.5); z-index: 10; user-select: none;
  }
  .sv { color: #ffdd57; } .lv { color: #ff6b6b; } .wv { color: #69db7c; } .bv { color: #44aaff; }
  #crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 30px; height: 30px; z-index: 10; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(68,170,255,0.6);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; background: rgba(0,0,0,0.7);
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 42px; color: #ffdd57; margin-bottom: 8px; text-shadow: 0 0 20px #ffdd5788; }
  #overlay h2 { font-size: 18px; color: #ff8fa3; margin-bottom: 25px; }
  #overlay .info { color: #aaa; font-size: 13px; margin: 3px 0; }
  #overlay .start { color: #69db7c; font-size: 18px; margin-top: 20px; animation: blink 1s infinite; cursor: pointer; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #baconBar {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    z-index: 10; text-align: center; display: none;
  }
  #baconBar .label { color: #ff6600; font-size: 14px; font-weight: bold; }
  #baconBar .bar { width: 180px; height: 5px; background: #331100; margin-top: 3px; border-radius: 3px; }
  #baconBar .fill { height: 100%; background: #ff6600; border-radius: 3px; transition: width 0.1s; }
  #waveAnnounce {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%);
    z-index: 10; text-align: center; display: none; pointer-events: none;
  }
  #waveAnnounce h2 { font-size: 36px; color: #fff; text-shadow: 0 0 20px #fff8; }
  #waveAnnounce p { font-size: 16px; color: #aaa; margin-top: 8px; }
  #bombBtn {
    position: absolute; bottom: 20px; right: 20px; z-index: 10;
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(68,170,255,0.25); border: 2px solid #44aaff;
    color: #44aaff; font-size: 22px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; touch-action: manipulation;
  }
  #bombBtn:active { background: rgba(68,170,255,0.5); }
  #shipHpBar {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    z-index: 10; text-align: center;
  }
  #shipHpBar .bar { width: 80px; height: 4px; background: #333; border-radius: 2px; }
  #shipHpBar .fill { height: 100%; background: #69db7c; border-radius: 2px; transition: width 0.15s; }
  #radar {
    position: absolute; bottom: 20px; left: 20px; z-index: 10;
    width: 140px; height: 140px; border-radius: 50%;
    border: 2px solid rgba(68,170,255,0.5); background: rgba(0,10,30,0.6);
    box-shadow: 0 0 12px rgba(68,170,255,0.2) inset;
  }
</style>
</head>
<body>
<div id="hud">
  <span>SCORE: <span class="sv" id="dScore">0</span></span>
  <span>LIVES: <span class="lv" id="dLives">3</span></span>
  <span>WAVE: <span class="wv" id="dWave">1</span></span>
  <span>BOMBS: <span class="bv" id="dBombs">5</span></span>
</div>
<div id="crosshair"></div>
<div id="overlay">
  <h1>PIG GALAGA: SPACE</h1>
  <h2>Full 3D Pig Hunt!</h2>
  <div class="info">Mouse to aim & fly · WASD extra thrust · Q/E up/down</div>
  <div class="info">SPACE to shoot · B to bomb</div>
  <div class="info">Touch: drag to aim &amp; move · double-tap to bomb</div>
  <div class="start" id="startBtn">Click to Start</div>
</div>
<div id="baconBar">
  <div class="label">🥓 BACON BOOST <span id="baconTime">10</span>s 🥓</div>
  <div class="bar"><div class="fill" id="baconFill" style="width:100%"></div></div>
</div>
<div id="waveAnnounce"><h2 id="waveText"></h2><p>Pigs incoming!</p></div>
<button id="bombBtn">💣</button>
<div id="shipHpBar"><div class="bar"><div class="fill" id="hpFill" style="width:100%"></div></div></div>
<canvas id="radar" width="140" height="140"></canvas>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ═══ AUDIO ═══
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playOink(pitch, dur) {
  const c = ensureAudio(), t = c.currentTime;
  const o1 = c.createOscillator(), o2 = c.createOscillator(), g = c.createGain(), n = c.createBiquadFilter();
  n.type = 'bandpass'; n.frequency.value = pitch * 2.5; n.Q.value = 5;
  o1.type = 'sawtooth'; o1.frequency.setValueAtTime(pitch, t); o1.frequency.exponentialRampToValueAtTime(pitch * 0.6, t + dur);
  o2.type = 'square'; o2.frequency.setValueAtTime(pitch * 1.01, t); o2.frequency.exponentialRampToValueAtTime(pitch * 0.58, t + dur);
  g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o1.connect(n); o2.connect(n); n.connect(g); g.connect(c.destination);
  o1.start(t); o2.start(t); o1.stop(t + dur); o2.stop(t + dur);
}
function sfxShoot() { const c = ensureAudio(), t = c.currentTime, o = c.createOscillator(), g = c.createGain(); o.type = 'square'; o.frequency.setValueAtTime(880, t); o.frequency.exponentialRampToValueAtTime(220, t + 0.08); g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + 0.08); }
function sfxHit() { playOink(500 + Math.random() * 200, 0.12); }
function sfxDeath() { playOink(600 + Math.random() * 100, 0.3); setTimeout(() => playOink(350, 0.25), 80); }
function sfxPlayerHit() { const c = ensureAudio(), t = c.currentTime; const b = c.createBuffer(1, c.sampleRate * 0.3, c.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length); const s = c.createBufferSource(); s.buffer = b; const g = c.createGain(); g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3); const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(2000, t); f.frequency.exponentialRampToValueAtTime(100, t + 0.3); s.connect(f); f.connect(g); g.connect(c.destination); s.start(t); s.stop(t + 0.3); }
function sfxBomb() { const c = ensureAudio(), t = c.currentTime; const o = c.createOscillator(), g = c.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.6); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t + 0.6); }
function sfxBacon() { playOink(400, 0.3); setTimeout(() => playOink(500, 0.3), 150); setTimeout(() => playOink(600, 0.4), 300); }
function sfxWave() { playOink(300, 0.2); setTimeout(() => playOink(400, 0.2), 120); setTimeout(() => playOink(500, 0.25), 240); }
function sfxPowerup() { const c = ensureAudio(), t = c.currentTime; [0, 0.08, 0.16].forEach((d, i) => { const o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.value = 440 * (1 + i * 0.25); g.gain.setValueAtTime(0.1, t + d); g.gain.exponentialRampToValueAtTime(0.001, t + d + 0.1); o.connect(g); g.connect(c.destination); o.start(t + d); o.stop(t + d + 0.1); }); }

// ═══ THREE.JS SETUP ═══
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
scene.add(new THREE.AmbientLight(0x334466, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(50, 80, 50);
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x4488ff, 0.3).translateZ(-30));

// Starfield (surrounding sphere)
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 3000; i++) {
  const r = 800 + Math.random() * 200;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8 })));

// (nebulas removed — starfield is sufficient)

// ═══ PIG MESHES ═══
const PIG_COLORS = [
  { body: 0xffb6c1, snout: 0xff8fa3, ear: 0xff69b4 },
  { body: 0xf8a4b8, snout: 0xe8758a, ear: 0xe05580 },
  { body: 0xe89090, snout: 0xd06060, ear: 0xc04040 },
  { body: 0xd4a0a0, snout: 0xc07070, ear: 0xa05050 },
  { body: 0xffd700, snout: 0xffaa00, ear: 0xff8c00 },
];

function createPig(type, scale) {
  const g = new THREE.Group();
  const c = PIG_COLORS[type];
  const bm = new THREE.MeshStandardMaterial({ color: c.body, roughness: 0.6 });
  const sm = new THREE.MeshStandardMaterial({ color: c.snout, roughness: 0.5 });
  const em = new THREE.MeshStandardMaterial({ color: c.ear, roughness: 0.6 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 10), bm);
  body.scale.set(1, 0.85, 0.9);
  g.add(body);
  // Snout
  const sn = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 8), sm);
  sn.position.set(0, -0.1, 0.75);
  sn.scale.set(1, 0.8, 0.6);
  g.add(sn);
  // Nostrils
  const nm = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const n1 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 4), nm);
  n1.position.set(-0.12, -0.1, 1.0); g.add(n1);
  const n2 = n1.clone(); n2.position.x = 0.12; g.add(n2);
  // Eyes
  const ew = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const ep = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 6), ew);
  e1.position.set(-0.3, 0.2, 0.7); g.add(e1);
  const e2 = e1.clone(); e2.position.x = 0.3; g.add(e2);
  const p1 = new THREE.Mesh(new THREE.SphereGeometry(0.09, 6, 4), ep);
  p1.position.set(-0.3, 0.15, 0.83); g.add(p1);
  const p2 = p1.clone(); p2.position.x = 0.3; g.add(p2);
  // Ears
  const ear1 = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 4), em);
  ear1.position.set(-0.55, 0.6, 0.1); ear1.scale.set(0.5, 1, 0.4); ear1.rotation.z = 0.3; g.add(ear1);
  const ear2 = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 4), em);
  ear2.position.set(0.55, 0.6, 0.1); ear2.scale.set(0.5, 1, 0.4); ear2.rotation.z = -0.3; g.add(ear2);
  // Angry brows
  const brm = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const br1 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.04, 0.04), brm);
  br1.position.set(-0.3, 0.38, 0.78); br1.rotation.z = -0.3; g.add(br1);
  const br2 = br1.clone(); br2.position.x = 0.3; br2.rotation.z = 0.3; g.add(br2);

  // Accessories
  if (type === 1) { // Mama bow
    const bw = new THREE.MeshStandardMaterial({ color: 0xff1493 });
    const b1 = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.3, 4), bw); b1.position.set(-0.45, 0.8, 0.1); b1.rotation.z = 0.5; g.add(b1);
    const b2 = b1.clone(); b2.position.set(-0.25, 0.85, 0.1); b2.rotation.z = -0.5; g.add(b2);
  }
  if (type === 2) { // Papa hat
    const hm = new THREE.MeshStandardMaterial({ color: 0x222222 });
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.07, 12), hm), { position: new THREE.Vector3(0, 0.78, 0.1) }));
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.4, 12), hm), { position: new THREE.Vector3(0, 1.05, 0.1) }));
  }
  if (type === 3) { // Grandpa glasses
    const gm = new THREE.MeshStandardMaterial({ color: 0xffd700, wireframe: true });
    const l1 = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.02, 6, 12), gm); l1.position.set(-0.3, 0.2, 0.78); g.add(l1);
    const l2 = l1.clone(); l2.position.x = 0.3; g.add(l2);
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.18, 4), gm);
    br.position.set(0, 0.2, 0.84); br.rotation.z = Math.PI / 2; g.add(br);
  }
  if (type === 4) { // Bacon King crown + glow
    const cm = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.7, roughness: 0.2 });
    const cb = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 0.15, 12), cm);
    cb.position.set(0, 0.82, 0.1); g.add(cb);
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      const pt = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3, 4), cm);
      pt.position.set(Math.sin(a) * 0.35, 1.1, Math.cos(a) * 0.35 + 0.1); g.add(pt);
    }
    const jm = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
    const j = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 4), jm); j.position.set(0, 0.95, 0.5); g.add(j);
    const gl = new THREE.Mesh(new THREE.SphereGeometry(1.5, 12, 8),
      new THREE.MeshStandardMaterial({ color: 0xffd700, transparent: true, opacity: 0.12, emissive: 0xffd700, emissiveIntensity: 0.3 }));
    gl.name = 'glow'; g.add(gl);
  }

  g.scale.setScalar(scale);
  return g;
}

// ═══ SHIP ═══
function createShip() {
  const g = new THREE.Group();
  const bm = new THREE.MeshStandardMaterial({ color: 0x4dabf7, metalness: 0.4, roughness: 0.3 });
  const am = new THREE.MeshStandardMaterial({ color: 0x1971c2, metalness: 0.5, roughness: 0.2 });
  const cm = new THREE.MeshStandardMaterial({ color: 0x74c0fc, emissive: 0x74c0fc, emissiveIntensity: 0.3, metalness: 0.6 });

  const fuse = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2.2, 6), bm);
  fuse.rotation.x = -Math.PI / 2; fuse.position.z = -0.2; fuse.castShadow = true; g.add(fuse);
  const wings = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.07, 0.7), am);
  wings.position.z = 0.3; g.add(wings);
  const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 6), cm);
  cockpit.position.y = 0.18; g.add(cockpit);

  const em = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff6600, emissiveIntensity: 1, transparent: true, opacity: 0.8 });
  const eng = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.7, 6), em);
  eng.rotation.x = Math.PI / 2; eng.position.z = 1.1; eng.name = 'engine'; g.add(eng);

  g.scale.setScalar(1.3);
  return g;
}

// ═══ PARTICLES ═══
const particles = [];
const pGeo = new THREE.SphereGeometry(0.08, 4, 3);

function spawnP(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const m = new THREE.Mesh(pGeo, mat);
    m.position.copy(pos);
    const dir = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
    const spd = 0.05 + Math.random() * 0.2;
    scene.add(m);
    particles.push({ mesh: m, vel: dir.multiplyScalar(spd), life: 40 + Math.random() * 30, max: 70, scale: 0.5 + Math.random() * 1.5 });
  }
}

// ═══ GAME STATE ═══
let score = 0, lives = 3, wave = 0, bombs = 5;
let gameOver = false, gameStarted = false;
let invTimer = 0, baconTimer = 0, bombCooldown = 0, shootCooldown = 0;
let shakeTimer = 0, shipHp = 3, maxShipHp = 3;
let frame = 0;

// Ship state
const shipPos = new THREE.Vector3(0, 0, 0);
const shipQuat = new THREE.Quaternion();
const shipEuler = new THREE.Euler(0, 0, 0, 'YXZ');
const shipVel = new THREE.Vector3();
let shipMesh = null;

// Enemy/bullet arrays
let enemies = [];
let playerBullets = [];
let enemyBullets = [];
let bombRings = [];

// Input
const keys = {};
let mouseX = 0, mouseY = 0;
let isPointerLocked = false;

window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

renderer.domElement.addEventListener('mousemove', e => {
  if (isPointerLocked) {
    mouseX += e.movementX * 0.002;
    mouseY += e.movementY * 0.002;
    mouseY = Math.max(-1.2, Math.min(1.2, mouseY));
  } else if (gameStarted && !gameOver) {
    // Fallback: use mouse position relative to center of screen
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    mouseX = (e.clientX - cx) / cx * 1.5;
    mouseY = (e.clientY - cy) / cy * 1.0;
    mouseY = Math.max(-1.2, Math.min(1.2, mouseY));
  }
});

renderer.domElement.addEventListener('mousedown', e => {
  if (!gameStarted || gameOver) return;
  if (e.button === 0) keys['shoot'] = true;
});
renderer.domElement.addEventListener('mouseup', e => {
  if (e.button === 0) keys['shoot'] = false;
});

// Touch controls
let touchAimId = null, touchMoveId = null;
let touchAimX = 0, touchAimY = 0;
let touchMoveX = 0, touchMoveY = 0;
let touchShooting = false;
let lastTapTime = 0;

renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const x = t.clientX / window.innerWidth;
    if (x > 0.5) {
      touchAimId = t.identifier;
      touchAimX = t.clientX;
      touchAimY = t.clientY;
    } else {
      touchMoveId = t.identifier;
      touchMoveX = t.clientX;
      touchMoveY = t.clientY;
    }
  }
  touchShooting = true;
  const now = Date.now();
  if (now - lastTapTime < 300) { keys['KeyB'] = true; setTimeout(() => { keys['KeyB'] = false; }, 100); }
  lastTapTime = now;
  if (!gameStarted) startGame();
  if (gameOver) restartGame();
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchAimId) {
      const dx = (t.clientX - touchAimX) * 0.004;
      const dy = (t.clientY - touchAimY) * 0.004;
      mouseX += dx;
      mouseY += dy;
      mouseY = Math.max(-1.2, Math.min(1.2, mouseY));
      touchAimX = t.clientX;
      touchAimY = t.clientY;
    }
    if (t.identifier === touchMoveId) {
      touchMoveX = t.clientX;
      touchMoveY = t.clientY;
    }
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchAimId) touchAimId = null;
    if (t.identifier === touchMoveId) touchMoveId = null;
  }
  if (e.touches.length === 0) touchShooting = false;
});

// Bomb button
document.getElementById('bombBtn').addEventListener('mousedown', e => { e.preventDefault(); keys['KeyB'] = true; setTimeout(() => { keys['KeyB'] = false; }, 100); });
document.getElementById('bombBtn').addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); keys['KeyB'] = true; setTimeout(() => { keys['KeyB'] = false; }, 100); });

// ═══ WAVE SPAWNING ═══
function spawnWave(w) {
  enemies.forEach(e => scene.remove(e.mesh));
  enemies = [];
  const formations = [];

  // Ring formation
  function addRing(center, radius, count, type, hpBase) {
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2;
      const pos = new THREE.Vector3(
        center.x + Math.cos(a) * radius,
        center.y + Math.sin(a) * radius * 0.5,
        center.z + Math.sin(a) * radius
      );
      addEnemy(pos, type, hpBase);
    }
  }

  // Sphere formation
  function addSphere(center, radius, count, type, hpBase) {
    for (let i = 0; i < count; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const pos = new THREE.Vector3(
        center.x + radius * Math.sin(phi) * Math.cos(theta),
        center.y + radius * Math.sin(phi) * Math.sin(theta),
        center.z + radius * Math.cos(phi)
      );
      addEnemy(pos, type, hpBase);
    }
  }

  // Grid formation
  function addGrid(center, rows, cols, spacing, type, hpBase) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const pos = new THREE.Vector3(
          center.x + (c - (cols - 1) / 2) * spacing,
          center.y + (r - (rows - 1) / 2) * spacing * 0.5,
          center.z
        );
        addEnemy(pos, type, hpBase);
      }
    }
  }

  const dist = 20 + w * 3;
  const extra = Math.floor(w / 3);

  // Forward cluster
  addRing(new THREE.Vector3(0, 0, -dist), 10 + w, 8 + w, 0, 1 + extra);

  // Side rings
  if (w >= 2) {
    addRing(new THREE.Vector3(-dist * 0.7, 5, -dist * 0.5), 8, 6, 1, 2 + extra);
    addRing(new THREE.Vector3(dist * 0.7, -5, -dist * 0.5), 8, 6, 1, 2 + extra);
  }

  // Above/below
  if (w >= 3) {
    addGrid(new THREE.Vector3(0, dist * 0.5, -dist * 0.8), 2, 4, 4, 2, 3 + extra);
    addGrid(new THREE.Vector3(0, -dist * 0.5, -dist * 0.6), 2, 3, 4, 2, 3 + extra);
  }

  // Behind!
  if (w >= 4) {
    addRing(new THREE.Vector3(0, 0, dist * 0.5), 12, 6, 3, 4 + extra);
  }

  // Surround sphere
  if (w >= 5) {
    addSphere(new THREE.Vector3(0, 0, -dist * 0.3), dist * 0.4, 6 + w, 0, 1 + extra);
  }

  // Bacon Kings — more per wave
  if (w >= 2) {
    const bkCount = Math.min(1 + Math.floor(w / 2), 4);
    for (let i = 0; i < bkCount; i++) {
      const angle = (i / bkCount) * Math.PI * 2;
      const bkPos = new THREE.Vector3(
        Math.sin(angle) * (dist * 0.3),
        8 + Math.cos(angle) * 5,
        -dist - 5 + Math.sin(angle * 1.3) * 10
      );
      addEnemy(bkPos, 4, 6 + Math.floor(w / 2));
    }
  }
}

function addEnemy(pos, type, hp) {
  const scale = [0.8, 1.0, 1.1, 1.2, 1.5][type];
  const points = [100, 200, 400, 800, 1500][type];
  const mesh = createPig(type, scale);
  mesh.position.copy(pos);
  // Face toward origin initially
  mesh.lookAt(0, 0, 0);
  scene.add(mesh);

  const homePos = pos.clone();
  const origOffset = pos.clone(); // will be made relative after wave spawns
  enemies.push({
    mesh, type, hp, maxHp: hp, points, scale, homePos, origOffset,
    alive: true, diving: false, diveDir: new THREE.Vector3(),
    diveTime: 0, frame: Math.random() * 100, orbitAngle: Math.random() * Math.PI * 2,
    orbitSpeed: 0.002 + Math.random() * 0.003
  });
}

// ═══ INIT ═══
function initGame() {
  playerBullets.forEach(b => scene.remove(b.mesh));
  enemyBullets.forEach(b => scene.remove(b.mesh));
  bombRings.forEach(b => scene.remove(b.mesh));
  playerBullets = []; enemyBullets = []; bombRings = [];

  if (shipMesh) scene.remove(shipMesh);
  shipMesh = createShip();
  scene.add(shipMesh);
  shipPos.set(0, 0, 0);
  shipEuler.set(0, 0, 0);
  shipQuat.setFromEuler(shipEuler);
  shipVel.set(0, 0, 0);
  mouseX = 0; mouseY = 0;
  shootCooldown = 0;
  shipHp = maxShipHp;
  invTimer = 240; // 4 seconds invincibility at wave start

  wave++;
  announceWave(wave);
  spawnWave(wave);
  // Compute formation offsets relative to center of mass
  if (enemies.length > 0) {
    const center = new THREE.Vector3();
    let count = 0;
    enemies.forEach(e => { if (e.alive) { center.add(e.homePos); count++; } });
    center.divideScalar(count || 1);
    enemies.forEach(e => { if (e.alive) e.origOffset = e.homePos.clone().sub(center); });
  }
}

function announceWave(w) {
  const el = document.getElementById('waveAnnounce');
  document.getElementById('waveText').textContent = `WAVE ${w}`;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 2000);
}

function startGame() {
  gameStarted = true;
  document.getElementById('overlay').classList.add('hidden');
  renderer.domElement.requestPointerLock();
  initGame();
}

function restartGame() {
  score = 0; lives = 3; wave = 0; bombs = 5;
  gameOver = false; invTimer = 0; baconTimer = 0;
  document.getElementById('overlay').classList.add('hidden');
  renderer.domElement.requestPointerLock();
  initGame();
}

document.getElementById('overlay').addEventListener('click', () => {
  if (!gameStarted) startGame();
  else if (gameOver) restartGame();
});
document.getElementById('startBtn').addEventListener('click', () => {
  if (!gameStarted) startGame();
  else if (gameOver) restartGame();
});

// ═══ BULLET GEOMETRY ═══
const bGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5, 5);
const bMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
const baconMat = new THREE.MeshBasicMaterial({ color: 0xcc3300 });
const eBulletGeo = new THREE.SphereGeometry(0.12, 5, 4);
const eBulletMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });

// ═══ UPDATE ═══
const tmpV = new THREE.Vector3();
const tmpQ = new THREE.Quaternion();
const fwd = new THREE.Vector3();
const right = new THREE.Vector3();
const up = new THREE.Vector3();

function update(dt) {
  if (!gameStarted || gameOver) return;
  frame++;

  // Ship rotation from mouse
  shipEuler.y = -mouseX;
  shipEuler.x = -mouseY;
  shipQuat.setFromEuler(shipEuler);

  // Direction vectors
  fwd.set(0, 0, -1).applyQuaternion(shipQuat);
  right.set(1, 0, 0).applyQuaternion(shipQuat);
  up.set(0, 1, 0).applyQuaternion(shipQuat);

  // Thrust — full 3D movement
  const thrust = 0.010;
  const accel = new THREE.Vector3();
  if (keys['KeyW']) accel.add(fwd.clone().multiplyScalar(thrust));
  if (keys['KeyS']) accel.add(fwd.clone().multiplyScalar(-thrust * 0.7));
  if (keys['KeyA']) accel.add(right.clone().multiplyScalar(-thrust * 0.8));
  if (keys['KeyD']) accel.add(right.clone().multiplyScalar(thrust * 0.8));
  if (keys['KeyQ'] || keys['ShiftLeft'] || keys['ShiftRight']) accel.add(up.clone().multiplyScalar(-thrust * 0.6));
  if (keys['KeyE'] || keys['ControlLeft']) accel.add(up.clone().multiplyScalar(thrust * 0.6));

  // Auto-thrust toward crosshair: gentle drift, mainly for mouse
  const aimDist = Math.sqrt(mouseX * mouseX + mouseY * mouseY);
  const autoThrust = Math.min(aimDist, 1.5) * 0.003;
  if (autoThrust > 0.001) {
    accel.add(fwd.clone().multiplyScalar(autoThrust));
  }

  // Touch movement — full directional (left side stick)
  if (touchMoveId !== null) {
    const cx = window.innerWidth * 0.25;
    const cy = window.innerHeight * 0.5;
    const dx = (touchMoveX - cx) / (window.innerWidth * 0.25);
    const dy = (touchMoveY - cy) / (window.innerHeight * 0.25);
    accel.add(fwd.clone().multiplyScalar(thrust * 0.5 * -dy));
    accel.add(right.clone().multiplyScalar(thrust * 0.4 * dx));
  }
  // Touch aim — rotation only, no thrust

  shipVel.add(accel);
  shipVel.multiplyScalar(0.93); // higher drag = slower top speed
  shipPos.add(shipVel);

  // Update ship mesh
  shipMesh.position.copy(shipPos);
  shipMesh.quaternion.copy(shipQuat);
  // Bank on turn
  const bank = -mouseX * 0.1;
  shipMesh.rotateZ(bank * 0.05);

  // Engine flicker
  const eng = shipMesh.getObjectByName('engine');
  if (eng) eng.scale.y = 0.8 + Math.random() * 0.5;

  // Invincibility
  if (invTimer > 0) {
    invTimer--;
    shipMesh.visible = Math.floor(invTimer / 4) % 2 === 0;
  } else {
    shipMesh.visible = true;
  }

  // Camera: chase behind ship
  const camOffset = new THREE.Vector3(0, 2.5, 8);
  camOffset.applyQuaternion(shipQuat);
  const camTarget = shipPos.clone().add(camOffset);
  camera.position.lerp(camTarget, 0.08);
  const lookTarget = shipPos.clone().add(fwd.clone().multiplyScalar(10));
  camera.lookAt(lookTarget);

  // Shake
  if (shakeTimer > 0) {
    shakeTimer--;
    camera.position.x += (Math.random() - 0.5) * shakeTimer * 0.03;
    camera.position.y += (Math.random() - 0.5) * shakeTimer * 0.03;
  }

  // ── Shooting ──
  if (shootCooldown > 0) shootCooldown--;
  if (baconTimer > 0) baconTimer--;
  const isShooting = keys['Space'] || keys['shoot'] || touchShooting;
  if (isShooting && shootCooldown <= 0) {
    if (baconTimer > 0) {
      spawnBullet(0, true);
      spawnBullet(-0.5, true);
      spawnBullet(0.5, true);
      shootCooldown = 5;
    } else {
      spawnBullet(0, false);
      shootCooldown = 8;
    }
    sfxShoot();
  }

  // Bomb
  if (bombCooldown > 0) bombCooldown--;
  if (keys['KeyB'] && bombs > 0 && bombCooldown <= 0) {
    bombs--;
    bombCooldown = 30;
    sfxBomb();
    shakeTimer = 10;
    // Expanding sphere
    const ringGeo = new THREE.SphereGeometry(1, 16, 12);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.5, wireframe: true });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(shipPos);
    scene.add(ring);
    bombRings.push({ mesh: ring, origin: shipPos.clone(), radius: 1, maxRadius: 30, life: 50, maxLife: 50, dealt: new Set() });
    spawnP(shipPos, 0x44aaff, 15);
    keys['KeyB'] = false;
  }

  // ── Update bullets ──
  playerBullets = playerBullets.filter(b => {
    b.mesh.position.add(b.vel);
    b.life--;
    if (b.life <= 0) { scene.remove(b.mesh); return false; }
    return true;
  });

  enemyBullets = enemyBullets.filter(b => {
    b.mesh.position.add(b.vel);
    b.life--;
    if (b.life <= 0) { scene.remove(b.mesh); return false; }
    return true;
  });

  // ── Update enemies ──
  // Formation tracks player — stay at a visible combat distance ahead
  const playerSpeed = shipVel.length();
  const interceptPoint = shipPos.clone().add(fwd.clone().multiplyScalar(playerSpeed * 15 + 12));

  enemies.forEach(e => {
    if (!e.alive) return;
    e.frame++;

    // Chase: each pig targets intercept point offset by its formation position
    if (!e.diving) {
      const myTarget = interceptPoint.clone().add(e.origOffset);
      const toTarget = myTarget.clone().sub(e.homePos);
      const homeDist = toTarget.length();
      // Hold formation at distance — only close in slowly
      if (homeDist > 12) {
        e.homePos.lerp(myTarget, 0.012);
      }

      // Gentle repel from nearby pigs — much softer to avoid jitter
      enemies.forEach(other => {
        if (other === e || !other.alive) return;
        const sep = e.homePos.clone().sub(other.homePos);
        const d = sep.length();
        if (d < 5 && d > 0.1) {
          e.homePos.add(sep.normalize().multiplyScalar(0.01 * (5 - d)));
        }
      });

      // Smooth orbit around home position
      e.orbitAngle += e.orbitSpeed;
      const orbR = 2;
      e.mesh.position.lerp(new THREE.Vector3(
        e.homePos.x + Math.sin(e.orbitAngle) * orbR,
        e.homePos.y + Math.sin(e.orbitAngle * 0.7) * orbR * 0.5,
        e.homePos.z + Math.cos(e.orbitAngle) * orbR
      ), 0.08);
    }

    // Face toward player
    e.mesh.lookAt(shipPos);

    // Bacon King glow
    if (e.type === 4) {
      const gl = e.mesh.getObjectByName('glow');
      if (gl) gl.material.opacity = 0.08 + Math.sin(e.frame * 0.08) * 0.06;
    }

    // Dive attack
    if (e.diving) {
      e.diveTime++;
      const speed = 0.5 + wave * 0.03;
      // Continuously track player throughout dive
      e.diveDir.lerp(shipPos.clone().sub(e.mesh.position).normalize(), 0.06);
      e.mesh.position.add(e.diveDir.clone().multiplyScalar(speed));
      if (e.diveTime > 180) {
        e.diving = false;
      }
    }

    // Shooting toward player — more aggressive
    const distToPlayer = e.mesh.position.distanceTo(shipPos);
    if (distToPlayer < 60 && Math.random() < 0.002 + wave * 0.001) {
      const dir = shipPos.clone().sub(e.mesh.position).normalize().multiplyScalar(0.3 + wave * 0.02);
      const mesh = new THREE.Mesh(eBulletGeo, eBulletMat.clone());
      mesh.position.copy(e.mesh.position);
      scene.add(mesh);
      enemyBullets.push({ mesh, vel: dir, life: 200 });
    }
  });

  // Dive trigger — send multiple pigs
  if (frame % Math.max(30, 120 - wave * 15) === 0) {
    const candidates = enemies.filter(e => e.alive && !e.diving);
    const count = Math.min(candidates.length, 1 + Math.floor(wave / 2));
    for (let i = 0; i < count; i++) {
      const idx = Math.floor(Math.random() * candidates.length);
      const diver = candidates.splice(idx, 1)[0];
      diver.diving = true;
      diver.diveTime = 0;
      diver.diveDir = shipPos.clone().sub(diver.mesh.position).normalize();
    }
  }

  // ── Bullet vs bullet ──
  playerBullets.forEach(pb => {
    enemyBullets.forEach(eb => {
      if (pb.life <= 0 || eb.life <= 0) return;
      if (pb.mesh.position.distanceTo(eb.mesh.position) < 0.8) {
        spawnP(pb.mesh.position, 0x88ccff, 4);
        pb.life = 0; eb.life = 0;
      }
    });
  });

  // ── Bullet vs enemy ──
  playerBullets.forEach(b => {
    if (b.life <= 0) return;
    enemies.forEach(e => {
      if (!e.alive) return;
      const hitR = e.scale * 1.2;
      if (b.mesh.position.distanceTo(e.mesh.position) < hitR) {
        e.hp--;
        b.life = 0;
        spawnP(e.mesh.position, 0xffaa00, 4);
        sfxHit();
        if (e.hp <= 0) {
          e.alive = false;
          e.mesh.visible = false;
          score += e.points;
          spawnP(e.mesh.position, 0xff6b6b, 15);
          spawnP(e.mesh.position, 0xffb6c1, 10);
          sfxDeath();
          if (e.type === 4) {
            baconTimer = 900;
            sfxBacon();
            spawnP(e.mesh.position, 0xffd700, 25);
          }
        }
      }
    });
  });

  // ── Enemy bullet vs player ──
  if (invTimer <= 0) {
    enemyBullets.forEach(b => {
      if (b.life <= 0) return;
      if (b.mesh.position.distanceTo(shipPos) < 1.2) {
        b.life = 0;
        playerHit();
      }
    });
    // Enemy body vs player
    enemies.forEach(e => {
      if (!e.alive) return;
      if (e.mesh.position.distanceTo(shipPos) < e.scale + 1) {
        e.alive = false;
        e.mesh.visible = false;
        spawnP(e.mesh.position, 0xff6b6b, 20);
        playerHit();
      }
    });
  }

  // ── Bomb rings ──
  bombRings = bombRings.filter(br => {
    br.life--;
    br.radius += (br.maxRadius - 1) / br.maxLife;
    br.mesh.scale.setScalar(br.radius);
    br.mesh.material.opacity = (br.life / br.maxLife) * 0.4;

    enemyBullets.forEach(eb => {
      if (eb.mesh.position.distanceTo(br.origin) < br.radius) {
        spawnP(eb.mesh.position, 0x44aaff, 2);
        eb.life = 0;
      }
    });

    enemies.forEach(e => {
      if (!e.alive || br.dealt.has(e)) return;
      if (e.mesh.position.distanceTo(br.origin) < br.radius) {
        br.dealt.add(e);
        e.hp -= 3;
        spawnP(e.mesh.position, 0x44aaff, 6);
        sfxHit();
        if (e.hp <= 0) {
          e.alive = false; e.mesh.visible = false;
          score += e.points;
          spawnP(e.mesh.position, 0xff6b6b, 12);
          sfxDeath();
          if (e.type === 4) { baconTimer = 900; sfxBacon(); spawnP(e.mesh.position, 0xffd700, 25); }
        }
      }
    });

    if (br.life <= 0) { scene.remove(br.mesh); return false; }
    return true;
  });

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.add(p.vel);
    p.vel.multiplyScalar(0.97);
    p.life--;
    p.mesh.material.opacity = p.life / p.max;
    p.mesh.scale.setScalar(p.scale * (p.life / p.max));
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }

  // ── Wave clear ──
  if (enemies.length > 0 && enemies.every(e => !e.alive)) {
    wave++;
    bombs = 5;
    sfxWave();
    announceWave(wave);
    spawnWave(wave);
  }

  // ── HUD ──
  document.getElementById('dScore').textContent = score;
  document.getElementById('dLives').textContent = lives;
  document.getElementById('dWave').textContent = wave;
  document.getElementById('dBombs').textContent = bombs;

  const hpRatio = shipHp / maxShipHp;
  const hpFill = document.getElementById('hpFill');
  hpFill.style.width = (hpRatio * 100) + '%';
  hpFill.style.background = hpRatio > 0.5 ? '#69db7c' : hpRatio > 0.25 ? '#ffdd57' : '#ff6b6b';

  if (baconTimer > 0) {
    document.getElementById('baconBar').style.display = 'block';
    document.getElementById('baconTime').textContent = Math.ceil(baconTimer / 60);
    document.getElementById('baconFill').style.width = (baconTimer / 900 * 100) + '%';
  } else {
    document.getElementById('baconBar').style.display = 'none';
  }

  // ── Radar ──
  drawRadar();
}

const radarCanvas = document.getElementById('radar');
const radarCtx = radarCanvas.getContext('2d');
const RADAR_R = 70, RADAR_RANGE = 35;

function drawRadar() {
  const ctx = radarCtx;
  ctx.clearRect(0, 0, 140, 140);

  // Background ring
  ctx.strokeStyle = 'rgba(68,170,255,0.15)';
  ctx.lineWidth = 1;
  for (let r = 20; r <= 60; r += 20) {
    ctx.beginPath(); ctx.arc(RADAR_R, RADAR_R, r, 0, Math.PI * 2); ctx.stroke();
  }
  // Crosshairs
  ctx.beginPath(); ctx.moveTo(RADAR_R, 10); ctx.lineTo(RADAR_R, 130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, RADAR_R); ctx.lineTo(130, RADAR_R); ctx.stroke();

  // Rotate relative positions by ship yaw to get ship-local coords
  const yaw = shipEuler.y;
  const cosY = Math.cos(yaw), sinY = Math.sin(yaw);

  // Draw enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    const rel = e.mesh.position.clone().sub(shipPos);
    const dist = rel.length();

    // Transform to ship-local space (rotate by -yaw around Y)
    const localX = rel.x * cosY + rel.z * sinY;
    const localZ = -rel.x * sinY + rel.z * cosY;
    // In ship space: -Z is forward → localZ negative = ahead → top of radar

    const scale = (RADAR_R - 8) / RADAR_RANGE;
    let px = RADAR_R + localX * scale;
    let py = RADAR_R + localZ * scale;

    // Clamp to radar circle
    const dx = px - RADAR_R, dy = py - RADAR_R;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > RADAR_R - 6) {
      px = RADAR_R + dx / d * (RADAR_R - 6);
      py = RADAR_R + dy / d * (RADAR_R - 6);
    }

    // Color by pig type, brighter when closer
    const alpha = Math.max(0.3, 1 - dist / RADAR_RANGE);
    const colors = ['#ffb6c1', '#f8a4b8', '#e890a0', '#d08090', '#ffd700'];
    ctx.fillStyle = colors[e.type] || '#ff69b4';
    ctx.globalAlpha = alpha;
    const sz = e.type === 4 ? 4 : 2.5;
    ctx.beginPath(); ctx.arc(px, py, sz, 0, Math.PI * 2); ctx.fill();

    const relY = rel.y;
    if (Math.abs(relY) > 3) {
      ctx.beginPath();
      if (relY > 0) { // enemy is above
        ctx.moveTo(px, py - sz - 2); ctx.lineTo(px - 2, py - sz); ctx.lineTo(px + 2, py - sz);
      } else { // enemy is below
        ctx.moveTo(px, py + sz + 2); ctx.lineTo(px - 2, py + sz); ctx.lineTo(px + 2, py + sz);
      }
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Player dot (center)
  ctx.fillStyle = '#4dabf7';
  ctx.beginPath(); ctx.arc(RADAR_R, RADAR_R, 3, 0, Math.PI * 2); ctx.fill();
  // Player direction triangle
  ctx.fillStyle = '#4dabf7';
  ctx.beginPath();
  ctx.moveTo(RADAR_R, RADAR_R - 7);
  ctx.lineTo(RADAR_R - 3, RADAR_R - 3);
  ctx.lineTo(RADAR_R + 3, RADAR_R - 3);
  ctx.fill();

  // Label
  ctx.fillStyle = 'rgba(68,170,255,0.6)';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('RADAR', RADAR_R, 136);
}

function spawnBullet(offset, isBacon) {
  const mat = isBacon ? baconMat.clone() : bMat.clone();
  const mesh = new THREE.Mesh(bGeo, mat);
  const dir = fwd.clone();
  const spawnPos = shipPos.clone().add(dir.clone().multiplyScalar(1.5)).add(right.clone().multiplyScalar(offset));
  mesh.position.copy(spawnPos);
  mesh.quaternion.copy(shipQuat);
  mesh.rotateX(Math.PI / 2);
  scene.add(mesh);
  playerBullets.push({ mesh, vel: dir.clone().multiplyScalar(1.5), life: 120, bacon: isBacon });
}

function playerHit() {
  shipHp--;
  shakeTimer = 10;
  spawnP(shipPos, 0x4dabf7, 10);
  sfxPlayerHit();
  invTimer = 90;
  if (shipHp <= 0) {
    lives--;
    spawnP(shipPos, 0xffcc00, 20);
    invTimer = 180;
    shipHp = maxShipHp;
    if (lives <= 0) {
      gameOver = true;
      const ov = document.getElementById('overlay');
      ov.innerHTML = `
        <h1 style="color:#ff6b6b">GAME OVER</h1>
        <h2 style="color:#ffdd57">Score: ${score}</h2>
        <div class="start" id="startBtn">Click or Tap to Restart</div>
      `;
      ov.classList.remove('hidden');
      document.getElementById('startBtn').addEventListener('click', restartGame);
      document.exitPointerLock();
    }
  }
}

// ═══ MAIN LOOP ═══
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

animate();
</script>
